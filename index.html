<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SBU Routine Manager</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

:root{
--bg:#f3f6fb;
--card:#ffffff;
--primary:#0078d4;
--primary2:#106ebe;
--border:#d8dde6;
--text:#1f1f1f;
--muted:#666;
--success:#16a34a;
--danger:#dc2626;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

.topbar{
background:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:22px;
font-weight:600;
color:var(--primary);
}

.online{
font-size:14px;
color:var(--success);
font-weight:600;
}

.nav{
display:flex;
gap:10px;
padding:15px;
background:white;
border-bottom:1px solid var(--border);
flex-wrap:wrap;
}

.nav button{
padding:10px 18px;
border:none;
background:#eef4ff;
cursor:pointer;
border-radius:8px;
font-weight:600;
}

.nav button.active{
background:var(--primary);
color:white;
}

.container{
padding:20px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:20px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.row{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
border:1px solid var(--border);
border-radius:8px;
}

.btn{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:var(--primary);
color:white;
}

.btn-danger{
background:var(--danger);
color:white;
}

.btn-success{
background:var(--success);
color:white;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid var(--border);
padding:10px;
text-align:center;
}

th{
background:#eef4ff;
}

.hidden{
display:none;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
width:95%;
max-width:900px;
padding:20px;
border-radius:12px;
max-height:90vh;
overflow:auto;
}

.scheduleRow{
display:grid;
grid-template-columns:
1fr 1fr 1fr 1fr 1fr auto;
gap:10px;
margin-bottom:10px;
}

@media(max-width:768px){
.scheduleRow{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">
<i class="fa-solid fa-calendar-days"></i>
SBU Routine Manager
</div>

<div class="online" id="onlineCount">
1 Online
</div>
</div>

<div class="nav">
<button class="active" onclick="showPage('dashboard',this)">
Dashboard
</button>

<button onclick="showPage('today',this)">
Today's Classes
</button>

<button onclick="showPage('faculty',this)">
Faculty
</button>

<button onclick="showPage('substitution',this)">
Substitution
</button>
</div>

<div class="container">

<div class="card">
<div class="row">

<select id="facultySelect"
onchange="loadDashboard()">
<option>Select Faculty</option>
</select>

<select id="deptFilter"
onchange="filterDepartment()">
<option value="">
All Departments
</option>
</select>

<button class="btn btn-primary"
onclick="openModal()">
Add Faculty
</button>

<button class="btn btn-success"
onclick="exportData()">
Export Backup
</button>

</div>
</div>

<div id="dashboardPage"></div>
<div id="todayPage" class="hidden"></div>
<div id="facultyPage" class="hidden"></div>
<div id="substitutionPage" class="hidden"></div>

</div>
<!-- MODAL -->

<div class="modal" id="facultyModal">
<div class="modal-content">

<h2 style="margin-bottom:15px">
Faculty Details
</h2>

<div class="row">
<input id="name" placeholder="Faculty Name">
<input id="dept" placeholder="Department">
<input id="empid" placeholder="Employee ID">
<input id="email" placeholder="Email">
</div>

<h3 style="margin:15px 0">
Weekly Schedule
</h3>

<div id="scheduleContainer"></div>

<button class="btn btn-success"
onclick="addScheduleRow()">
Add Schedule
</button>

<hr style="margin:20px 0">

<button class="btn btn-primary"
onclick="saveFaculty()">
Save Faculty
</button>

<button class="btn btn-danger"
onclick="closeModal()">
Close
</button>

</div>
</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBIR71p9NAWc5yK6tK0SV2EHJFDa-U2GdU",
  authDomain: "sbu-routine.firebaseapp.com",
  databaseURL: "https://sbu-routine-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sbu-routine",
  storageBucket: "sbu-routine.firebasestorage.app",
  messagingSenderId: "196609987228",
  appId: "1:196609987228:web:5bd81d6cd05e5f9289d359",
  measurementId: "G-RB8YK0B0WF"
};
  

firebase.initializeApp(firebaseConfig);
console.log("Firebase Connected");

firebase.database()
.ref("test")
.set({
  status:"working",
  time:new Date().toISOString()
})
.then(()=>console.log("Write Success"))
.catch(err=>console.error(err));
const db = firebase.database();
const facultyRef = db.ref("faculty");

firebase.initializeApp(firebaseConfig);

const presenceRef=db.ref("presence");

let faculty=[];

let currentFacultyId="";

let editId=null;

const days=[
"Monday",
"Tuesday",
"Wednesday",
"Thursday",
"Friday",
"Saturday"
];

const periods=[
"09:00-10:00",
"10:00-11:00",
"11:00-12:00",
"12:00-13:00",
"13:00-14:00",
"14:00-15:00",
"15:00-16:00",
"16:00-17:00"
];

document.addEventListener(
"DOMContentLoaded",
()=>{
setupPresence();
loadFaculty();
}
);

function setupPresence(){

const user=presenceRef.push();

user.set(true);

user.onDisconnect().remove();

presenceRef.on(
"value",
snap=>{
document.getElementById(
"onlineCount"
).innerText=
snap.numChildren()+" Online";
}
);

}

function showPage(page,btn){

document
.querySelectorAll(".nav button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

document
.getElementById("dashboardPage")
.classList.add("hidden");

document
.getElementById("todayPage")
.classList.add("hidden");

document
.getElementById("facultyPage")
.classList.add("hidden");

document
.getElementById("substitutionPage")
.classList.add("hidden");

document
.getElementById(page+"Page")
.classList.remove("hidden");

if(page==="dashboard")
loadDashboard();

if(page==="today")
loadToday();

if(page==="faculty")
loadFacultyPage();

if(page==="substitution")
loadSubstitution();

}

function openModal(){

editId=null;

document
.getElementById("facultyModal")
.style.display="flex";

document.getElementById("name").value="";
document.getElementById("dept").value="";
document.getElementById("empid").value="";
document.getElementById("email").value="";

document
.getElementById("scheduleContainer")
.innerHTML="";

addScheduleRow();

}

function closeModal(){

document
.getElementById("facultyModal")
.style.display="none";

}
function addScheduleRow(data={}){

const id=Date.now()+Math.random();

const row=document.createElement("div");

row.className="scheduleRow";

row.id=id;

row.innerHTML=`

<select class="day">

<option value="">Day</option>

${days.map(d=>
`<option ${data.day===d?'selected':''}>
${d}
</option>`
).join("")}

</select>

<select class="period">

<option value="">Period</option>

${periods.map(p=>
`<option ${data.period===p?'selected':''}>
${p}
</option>`
).join("")}

</select>

<input class="subject"
placeholder="Subject"
value="${data.subject||''}">

<input class="room"
placeholder="Room"
value="${data.room||''}">

<input class="section"
placeholder="Section"
value="${data.section||''}">

<button class="btn btn-danger"
onclick="removeSchedule('${id}')">
X
</button>

`;

document
.getElementById("scheduleContainer")
.appendChild(row);

}

function removeSchedule(id){

document.getElementById(id)?.remove();

}

function saveFaculty(){

const name=
document.getElementById("name").value;

const dept=
document.getElementById("dept").value;

if(!name || !dept){

alert("Name and Department Required");

return;

}

const schedules=[];

document
.querySelectorAll(".scheduleRow")
.forEach(row=>{

schedules.push({

day:
row.querySelector(".day").value,

period:
row.querySelector(".period").value,

subject:
row.querySelector(".subject").value,

room:
row.querySelector(".room").value,

section:
row.querySelector(".section").value

});

});

const obj={

name,

dept,

empid:
document.getElementById("empid").value,

email:
document.getElementById("email").value,

schedules

};

if(editId){

facultyRef
.child(editId)
.set(obj);

}else{

facultyRef.push(obj);

}

closeModal();

}

function loadFaculty(){

facultyRef.on(
"value",
snap=>{

const data=snap.val();

faculty=data
? Object.keys(data)
.map(id=>({
id,
...data[id]
}))
: [];

populateFacultyDropdown();

loadDashboard();

}
);

}

function populateFacultyDropdown(){

const select=
document.getElementById(
"facultySelect"
);

select.innerHTML="";

faculty.forEach(f=>{

select.innerHTML+=`

<option value="${f.id}">
${f.name} (${f.dept})
</option>

`;

});

if(faculty.length){

currentFacultyId=
faculty[0].id;

select.value=
currentFacultyId;

}

populateDepartments();

}

function populateDepartments(){

const depts=[
...new Set(
faculty.map(f=>f.dept)
)
];

const select=
document.getElementById(
"deptFilter"
);

select.innerHTML=
'<option value="">All Departments</option>';

depts.forEach(d=>{

select.innerHTML+=
`<option>${d}</option>`;

});

}
    function filterDepartment(){

const dept=
document.getElementById(
"deptFilter"
).value;

const select=
document.getElementById(
"facultySelect"
);

select.innerHTML="";

faculty
.filter(f=>
!dept || f.dept===dept
)
.forEach(f=>{

select.innerHTML+=`
<option value="${f.id}">
${f.name}
</option>
`;

});

if(select.options.length){

currentFacultyId=
select.options[0].value;

select.value=
currentFacultyId;

}

loadDashboard();

}

function loadDashboard(){

currentFacultyId=
document.getElementById(
"facultySelect"
).value
|| currentFacultyId;

const f=
faculty.find(
x=>x.id===currentFacultyId
);

if(!f){

document.getElementById(
"dashboardPage"
).innerHTML=
"<div class='card'>No Faculty Selected</div>";

return;

}

let html=`

<div class="card">

<h2>${f.name}</h2>

<p>
${f.dept}
|
${f.empid||'No ID'}
|
${f.email||'No Email'}
</p>

</div>

<div class="card">

<table>

<tr>
<th>Day</th>
${periods.map(
p=>`<th>${p}</th>`
).join("")}
</tr>

`;

days.forEach(day=>{

html+=`<tr><td><b>${day}</b></td>`;

periods.forEach(period=>{

const cls=
f.schedules?.find(
s=>s.day===day &&
s.period===period
);

html+=cls
?
`<td>
<b>${cls.subject}</b>
<br>
${cls.room}
</td>`
:
"<td>Free</td>";

});

html+="</tr>";

});

html+=`
</table>
</div>
`;

document.getElementById(
"dashboardPage"
).innerHTML=html;

}

function loadToday(){

const f=
faculty.find(
x=>x.id===currentFacultyId
);

if(!f) return;

const today=
new Date()
.toLocaleDateString(
"en-US",
{weekday:"long"}
);

const classes=
f.schedules?.filter(
s=>s.day===today
) || [];

let html=`
<div class="card">
<h2>${today}</h2>
</div>
`;

if(classes.length===0){

html+=`
<div class="card">
No Classes Today
</div>
`;

}else{

classes.forEach(c=>{

html+=`
<div class="card">
<h3>${c.subject}</h3>
<p>
${c.period}
|
Room ${c.room}
|
${c.section}
</p>
</div>
`;

});

}

document.getElementById(
"todayPage"
).innerHTML=html;

}
    function loadFacultyPage(){

let html=`
<div class="card">
<h2>
Faculty Management
</h2>
<p>
Total Faculty :
${faculty.length}
</p>
</div>
`;

faculty.forEach(f=>{

html+=`

<div class="card">

<h3>${f.name}</h3>

<p>
${f.dept}
|
${f.empid||'N/A'}
|
${f.email||'N/A'}
</p>

<br>

<button
class="btn btn-primary"
onclick="editFaculty('${f.id}')">
Edit
</button>

<button
class="btn btn-danger"
onclick="deleteFaculty('${f.id}')">
Delete
</button>

</div>

`;

});

document.getElementById(
"facultyPage"
).innerHTML=html;

}

function editFaculty(id){

const f=
faculty.find(
x=>x.id===id
);

if(!f) return;

editId=id;

document.getElementById(
"name"
).value=f.name||"";

document.getElementById(
"dept"
).value=f.dept||"";

document.getElementById(
"empid"
).value=f.empid||"";

document.getElementById(
"email"
).value=f.email||"";

document.getElementById(
"scheduleContainer"
).innerHTML="";

if(f.schedules){

f.schedules.forEach(
s=>addScheduleRow(s)
);

}

document.getElementById(
"facultyModal"
).style.display="flex";

}

function deleteFaculty(id){

if(
!confirm(
"Delete Faculty?"
)
) return;

facultyRef
.child(id)
.remove();

}

function loadSubstitution(){

let html=`

<div class="card">

<h2>
Substitution Finder
</h2>

<div class="row">

<select id="subDay">

<option value="">
Select Day
</option>

${days.map(
d=>`<option>${d}</option>`
).join("")}

</select>

<select id="subPeriod">

<option value="">
Select Period
</option>

${periods.map(
p=>`<option>${p}</option>`
).join("")}

</select>

<button
class="btn btn-primary"
onclick="findAvailableFaculty()">

Find Faculty

</button>

</div>

<div id="subResult">

</div>

</div>

`;

document.getElementById(
"substitutionPage"
).innerHTML=html;

}

function findAvailableFaculty(){

const day=
document.getElementById(
"subDay"
).value;

const period=
document.getElementById(
"subPeriod"
).value;

let freeFaculty=
faculty.filter(f=>{

const busy=
f.schedules?.some(
s=>
s.day===day &&
s.period===period
);

return !busy;

});

let html="";

if(freeFaculty.length===0){

html=
"<div class='card'>No Faculty Available</div>";

}else{

freeFaculty.forEach(f=>{

html+=`

<div class="card">

<b>${f.name}</b>

<br>

${f.dept}

</div>

`;

});

}

document.getElementById(
"subResult"
).innerHTML=html;

}
    function exportData(){

const dataStr=
JSON.stringify(
faculty,
null,
2
);

const blob=
new Blob(
[dataStr],
{
type:
"application/json"
}
);

const a=
document.createElement("a");

a.href=
URL.createObjectURL(blob);

a.download=
"SBU_Faculty_Backup.json";

a.click();

}

function importData(file){

const reader=
new FileReader();

reader.onload=
function(e){

try{

const data=
JSON.parse(
e.target.result
);

facultyRef.remove();

data.forEach(f=>{

facultyRef.push(f);

});

alert(
"Backup Imported Successfully"
);

}catch(err){

alert(
"Invalid JSON File"
);

}

};

reader.readAsText(file);

}

function createImportButton(){

const div=
document.createElement("div");

div.innerHTML=`

<br>

<input
type="file"
accept=".json"
onchange="
importData(
this.files[0]
)
">

`;

document.body.appendChild(div);

}

createImportButton();

window.onclick=
function(e){

const modal=
document.getElementById(
"facultyModal"
);

if(e.target===modal){

closeModal();

}

};

loadDashboard();

</script>

</body>
</html>
