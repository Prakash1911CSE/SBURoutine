<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SBU Routine Manager</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#f3f6fb;--card:#ffffff;--primary:#0078d4;--primary-hover:#106ebe;
  --border:#d8dde6;--text:#1f1f1f;--muted:#6b7280;--success:#16a34a;
  --danger:#dc2626;--warning:#d97706;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:var(--bg);color:var(--text);min-height:100vh;}
#loginPage{display:flex;justify-content:center;align-items:center;height:100vh;background:var(--bg);}
.login-card{width:400px;max-width:90%;}
#appContainer{display:none;min-height:100vh;flex-direction:column;}
.app-header{background:white;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.header-top{padding:12px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
.logo{font-size:20px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:8px;}
.header-right{display:flex;align-items:center;gap:16px;}
.online{font-size:13px;color:var(--success);font-weight:600;display:flex;align-items:center;gap:6px;}
#subAlert{font-weight:600;color:var(--danger);font-size:13px;}
.nav-tabs{display:flex;gap:8px;padding:0 24px 12px 24px;background:white;overflow-x:auto;}
.nav-tabs button{padding:8px 16px;border:none;background:#eef4ff;cursor:pointer;border-radius:6px;font-weight:600;font-size:14px;white-space:nowrap;transition:all.2s;}
.nav-tabs button:hover{background:#dbeafe;}
.nav-tabs button.active{background:var(--primary);color:white;}
.main-wrapper{flex:1;padding:20px 24px;max-width:1400px;margin:0 auto;width:100%;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:12px;}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;transition:border.2s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);}
.btn{padding:9px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:6px;transition:all.2s;}
.btn:hover{transform:translateY(-1px);}
.btn-primary{background:var(--primary);color:white;}
.btn-primary:hover{background:var(--primary-hover);}
.btn-danger{background:var(--danger);color:white;}
.btn-success{background:var(--success);color:white;}
.btn-secondary{background:#e5e7eb;color:var(--text);}
.btn-warning{background:var(--warning);color:white;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th,td{border:1px solid var(--border);padding:10px;text-align:center;}
th{background:#f8fafc;font-weight:600;color:var(--muted);font-size:12px;text-transform:uppercase;}
td b{color:var(--primary);}
.hidden{display:none!important;}
.page{min-height:400px;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:1000;padding:20px;}
.modal-content{background:white;width:100%;max-width:900px;padding:24px;border-radius:12px;max-height:90vh;overflow:auto;}
.scheduleRow{display:grid;grid-template-columns:1.2fr 1.2fr 1.5fr 1fr 1fr auto;gap:10px;margin-bottom:10px;align-items:center;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state i{font-size:48px;margin-bottom:12px;opacity:.3;}
.badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;}
.badge-success{background:#dcfce7;color:#166534;}
.badge-danger{background:#fee2e2;color:#991b1b;}
.badge-warning{background:#fef3c7;color:#92400e;}
.sub-card{padding:12px;margin:10px 0;border-left:4px solid var(--primary);background:#f0f7ff;border-radius:6px;}
@media(max-width:768px){
.header-top{padding:12px 16px;}
.nav-tabs{padding:0 16px 12px 16px;}
.main-wrapper{padding:16px;}
.scheduleRow{grid-template-columns:1fr;gap:8px;}
.scheduleRow button{justify-self:start;}
  table{font-size:12px;}
  th,td{padding:6px 4px;}
}
@media print{
 .no-print{display:none!important;}
  body{background:white;}
 .card{box-shadow:none;border:1px solid #000;}
}

/* Leave Form PDF Styles */
.leave-form-pdf{width:794px;padding:40px;background:white;color:#000;font-family:'Times New Roman',serif;font-size:12pt;}
.leave-form-pdf h2{text-align:center;font-size:18pt;margin:10px 0 5px 0;}
.leave-form-pdf h3{text-align:center;font-size:14pt;margin:5px 0 20px 0;}
.leave-form-pdf.form-row{margin:12px 0;display:flex;gap:10px;}
.leave-form-pdf.form-label{min-width:180px;font-weight:600;}
.leave-form-pdf.form-value{flex:1;border-bottom:1px dotted #000;min-height:20px;}
.leave-form-pdf table{width:100%;border-collapse:collapse;margin:20px 0;font-size:11pt;}
.leave-form-pdf th,.leave-form-pdf td{border:1px solid #000;padding:6px;text-align:center;}
.leave-form-pdf.signature-section{margin-top:40px;}
</style>
</head>

<body>
<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="card login-card">
    <h2 style="margin-bottom:20px;"><i class="fa-solid fa-calendar-days"></i> SBU Routine Manager</h2>
    <input id="loginEmail" type="email" placeholder="Email" style="margin-bottom:10px;">
    <input id="loginPassword" type="password" placeholder="Password" style="margin-bottom:15px;">
    <button class="btn btn-primary" style="width:100%;" onclick="loginUser()">Login</button>
    <div id="loginMsg" style="margin-top:12px;color:var(--danger);font-size:13px;"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="appContainer">
  <header class="app-header no-print">
    <div class="header-top">
      <div class="logo"><i class="fa-solid fa-calendar-days"></i> SBU Routine Manager</div>
      <div class="header-right">
        <div id="subAlert"></div>
        <span class="online" id="onlineCount"><i class="fa-solid fa-circle" style="font-size:8px;"></i> 1 Online</span>
        <button class="btn btn-danger" onclick="logoutUser()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
    </div>
    <div class="nav-tabs">
      <button class="active" onclick="showPage('dashboard',this)"><i class="fa-solid fa-gauge"></i> Dashboard</button>
      <button onclick="showPage('today',this)"><i class="fa-solid fa-calendar-day"></i> Today's Classes</button>
      <button onclick="showPage('faculty',this)"><i class="fa-solid fa-users"></i> Faculty</button>
      <button onclick="showPage('substitution',this)"><i class="fa-solid fa-people-arrows"></i> Substitution</button>
      <button onclick="showPage('leave',this)"><i class="fa-solid fa-file-lines"></i> Leave Application</button>
      <button onclick="showPage('history',this)"><i class="fa-solid fa-clock-rotate-left"></i> History</button>
    </div>
  </header>

  <main class="main-wrapper">
    <div class="card no-print">
      <div class="row">
        <select id="facultySelect" onchange="loadDashboard()"><option>Select Faculty</option></select>
        <select id="deptFilter" onchange="filterDepartment()"><option value="">All Departments</option></select>
        <button class="btn btn-primary" onclick="openModal()"><i class="fa-solid fa-plus"></i> Add Faculty</button>
        <button class="btn btn-success" onclick="exportData()"><i class="fa-solid fa-download"></i> Export</button>
      </div>
    </div>

    <div id="activeSubs"></div>
    <div id="dashboardPage" class="page"></div>
    <div id="todayPage" class="page hidden"></div>
    <div id="facultyPage" class="page hidden"></div>
    <div id="substitutionPage" class="page hidden"></div>
    <div id="leavePage" class="page hidden"></div>
    <div id="historyPage" class="page hidden"></div>
  </main>
</div>

<!-- MODAL -->
<div class="modal" id="facultyModal">
  <div class="modal-content">
    <h2 style="margin-bottom:20px">Faculty Details</h2>
    <div class="row">
      <input id="name" placeholder="Faculty Name *">
      <input id="dept" placeholder="Department *">
      <input id="empid" placeholder="Employee ID">
      <input id="email" placeholder="Email">
      <input id="mobile" placeholder="Mobile No">
      <input id="designation" placeholder="Designation">
    </div>
    <h3 style="margin:20px 0 12px 0">Weekly Schedule</h3>
    <div id="scheduleContainer"></div>
    <button class="btn btn-success" onclick="addScheduleRow()" style="margin-bottom:20px"><i class="fa-solid fa-plus"></i> Add Schedule</button>
    <hr style="margin:20px 0;border:none;border-top:1px solid var(--border)">
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveFaculty()"><i class="fa-solid fa-save"></i> Save Faculty</button>
    </div>
  </div>
</div>

<!-- HIDDEN LEAVE FORM FOR PDF -->
<div id="leaveFormTemplate" style="position:absolute;left:-9999px;top:0;"></div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>  

<script>
const { jsPDF } = window.jspdf;

const firebaseConfig = {
  apiKey: "AIzaSyBIR71p9NAWc5yK6tK0SV2EHJFDa-U2GdU",
  authDomain: "sbu-routine.firebaseapp.com",
  databaseURL: "https://sbu-routine-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sbu-routine",
  storageBucket: "sbu-routine.firebasestorage.app",
  messagingSenderId: "196609987228",
  appId: "1:196609987228:web:5bd81d6cd05e5f9289d359",
  measurementId: "G-RB8YK0B0WF"
};
  

firebase.initializeApp(firebaseConfig);
console.log("Firebase Connected");

firebase.database()
.ref("test")
.set({
  status:"working",
  time:new Date().toISOString()
})
.then(()=>console.log("Write Success"))
.catch(err=>console.error(err));
const db = firebase.database();
const auth = firebase.auth();
const facultyRef = db.ref("faculty");
const substitutionRef = db.ref("substitutions");
const leaveRef = db.ref("leaveApplications");
const presenceRef = db.ref("presence");

let faculty = [];
let currentFacultyId = "";
let editId = null;
let substitutions = [];
let leaveApps = [];

const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const periods = ["09:00-10:00","10:00-11:00","11:00-12:00","12:00-01:00","01:00-02:00","02:00-03:00","03:00-04:00","04:00-05:00"];

function loginUser(){
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;
  auth.signInWithEmailAndPassword(email,password)
.catch(err=>{document.getElementById("loginMsg").innerHTML=err.message;});
}

function logoutUser(){auth.signOut();}

firebase.auth().onAuthStateChanged(user=>{
  if(!user){
    document.getElementById("loginPage").style.display="flex";
    document.getElementById("appContainer").style.display="none";
    return;
  }
  document.getElementById("loginPage").style.display="none";
  document.getElementById("appContainer").style.display="flex";
  setupPresence();
  loadFaculty();
  loadSubstitutions();
  loadLeaveApplications();
  loadActiveSubstitutions();
  updateSubAlert();
});

function setupPresence(){
  const user = presenceRef.push();
  user.set(true);
  user.onDisconnect().remove();
  presenceRef.on("value",snap=>{
    document.getElementById("onlineCount").innerHTML=`<i class="fa-solid fa-circle" style="font-size:8px;"></i> ${snap.numChildren()} Online`;
  });
}

function showPage(page,btn){
  document.querySelectorAll(".nav-tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
  document.getElementById(page+"Page").classList.remove("hidden");
  if(page==="dashboard")loadDashboard();
  if(page==="today")loadToday();
  if(page==="faculty")loadFacultyPage();
  if(page==="substitution")loadSubstitutionPage();
  if(page==="leave")loadLeavePage();
  if(page==="history")loadHistoryPage();
}

// FACULTY CRUD - keeping your existing functions
function openModal(){
  editId=null;
  document.getElementById("facultyModal").style.display="flex";
  document.getElementById("name").value="";
  document.getElementById("dept").value="";
  document.getElementById("empid").value="";
  document.getElementById("email").value="";
  document.getElementById("mobile").value="";
  document.getElementById("designation").value="";
  document.getElementById("scheduleContainer").innerHTML="";
  addScheduleRow();
}

function closeModal(){document.getElementById("facultyModal").style.display="none";}

function addScheduleRow(data={}){
  const id=Date.now()+Math.random();
  const row=document.createElement("div");
  row.className="scheduleRow";
  row.id=id;
  row.innerHTML=`
    <select class="day"><option value="">Day</option>${days.map(d=>`<option ${data.day===d?'selected':''}>${d}</option>`).join("")}</select>
    <select class="period"><option value="">Period</option>${periods.map(p=>`<option ${data.period===p?'selected':''}>${p}</option>`).join("")}</select>
    <input class="subject" placeholder="Subject" value="${data.subject||''}">
    <input class="room" placeholder="Room" value="${data.room||''}">
    <input class="section" placeholder="Section/Class" value="${data.section||''}">
    <button class="btn btn-danger" onclick="removeSchedule('${id}')"><i class="fa-solid fa-xmark"></i></button>
  `;
  document.getElementById("scheduleContainer").appendChild(row);
}

function removeSchedule(id){document.getElementById(id)?.remove();}

function saveFaculty(){
  const name=document.getElementById("name").value;
  const dept=document.getElementById("dept").value;
  if(!name ||!dept){alert("Name and Department Required");return;}
  const schedules=[];
  document.querySelectorAll(".scheduleRow").forEach(row=>{
    const day=row.querySelector(".day").value;
    const period=row.querySelector(".period").value;
    if(day&&period){
      schedules.push({
        day,period,
        subject:row.querySelector(".subject").value,
        room:row.querySelector(".room").value,
        section:row.querySelector(".section").value
      });
    }
  });
  const obj={
    name,dept,
    empid:document.getElementById("empid").value,
    email:document.getElementById("email").value,
    mobile:document.getElementById("mobile").value,
    designation:document.getElementById("designation").value,
    schedules
  };
  if(editId){facultyRef.child(editId).set(obj);}else{facultyRef.push(obj);}
  closeModal();
}

function loadFaculty(){
  facultyRef.on("value",snap=>{
    const data=snap.val();
    faculty=data?Object.keys(data).map(id=>({id,...data[id]})):[];
    populateFacultyDropdown();
    loadDashboard();
  });
}

function populateFacultyDropdown(){
  const select=document.getElementById("facultySelect");
  select.innerHTML="";
  faculty.forEach(f=>{select.innerHTML+=`<option value="${f.id}">${f.name} (${f.dept})</option>`;});
  if(faculty.length){currentFacultyId=faculty[0].id;select.value=currentFacultyId;}
  populateDepartments();
}

function populateDepartments(){
  const depts=[...new Set(faculty.map(f=>f.dept))];
  const select=document.getElementById("deptFilter");
  select.innerHTML='<option value="">All Departments</option>';
  depts.forEach(d=>{select.innerHTML+=`<option>${d}</option>`;});
}

function filterDepartment(){
  const dept=document.getElementById("deptFilter").value;
  const select=document.getElementById("facultySelect");
  select.innerHTML="";
  faculty.filter(f=>!dept || f.dept===dept).forEach(f=>{
    select.innerHTML+=`<option value="${f.id}">${f.name}</option>`;
  });
  if(select.options.length){currentFacultyId=select.options[0].value;select.value=currentFacultyId;}
  loadDashboard();
}

function loadDashboard(){
  currentFacultyId=document.getElementById("facultySelect").value||currentFacultyId;
  const f=faculty.find(x=>x.id===currentFacultyId);
  if(!f){
    document.getElementById("dashboardPage").innerHTML=`<div class="empty-state"><i class="fa-solid fa-user-slash"></i><p>No Faculty Selected</p></div>`;
    return;
  }
  let html=`<div class="card"><h2>${f.name}</h2><p style="color:var(--muted);margin-top:4px;">${f.dept} | ${f.empid||'No ID'} | ${f.email||'No Email'}</p></div><div class="card"><table><tr><th>Day</th>${periods.map(p=>`<th>${p}</th>`).join("")}</tr>`;
  days.forEach(day=>{
    html+=`<tr><td><b>${day}</b></td>`;
    periods.forEach(period=>{
      const cls=f.schedules?.find(s=>s.day===day&&s.period===period);
      html+=cls?`<td><b>${cls.subject}</b><br><span style="font-size:12px;color:var(--muted)">Sec: ${cls.section}<br>${cls.room}</span></td>`:"<td>-</td>";
    });
    html+="</tr>";
  });
  html+=`</table></div>`;
  document.getElementById("dashboardPage").innerHTML=html;
}

function loadToday(){
  const f=faculty.find(x=>x.id===currentFacultyId);
  if(!f) return;
  const today=new Date().toLocaleDateString("en-US",{weekday:"long"});
  const classes=f.schedules?.filter(s=>s.day===today) || [];
  let html=`<div class="card"><h2>${today}'s Schedule</h2></div>`;
  if(classes.length===0){
    html+=`<div class="empty-state"><i class="fa-solid fa-calendar-xmark"></i><p>No Classes Today</p></div>`;
  }else{
    classes.forEach(c=>{
      html+=`<div class="card"><h3>${c.subject}</h3><p style="color:var(--muted);margin-top:6px;"><i class="fa-solid fa-clock"></i> ${c.period} | <i class="fa-solid fa-door-open"></i> Room ${c.room} | <i class="fa-solid fa-users"></i> ${c.section}</p></div>`;
    });
  }
  document.getElementById("todayPage").innerHTML=html;
}

function loadFacultyPage(){
  let html=`<div class="card"><h2>Faculty Management</h2><p style="color:var(--muted);margin-top:4px;">Total Faculty: ${faculty.length}</p></div>`;
  if(faculty.length===0){
    html+=`<div class="empty-state"><i class="fa-solid fa-users-slash"></i><p>No faculty added yet</p></div>`;
  }else{
    faculty.forEach(f=>{
      html+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:start;gap:16px;flex-wrap:wrap;"><div><h3>${f.name}</h3><p style="color:var(--muted);margin-top:6px;">${f.dept} | ${f.empid||'N/A'} | ${f.email||'N/A'}</p></div><div style="display:flex;gap:8px;"><button class="btn btn-primary" onclick="editFaculty('${f.id}')"><i class="fa-solid fa-edit"></i> Edit</button><button class="btn btn-danger" onclick="deleteFaculty('${f.id}')"><i class="fa-solid fa-trash"></i> Delete</button></div></div></div>`;
    });
  }
  document.getElementById("facultyPage").innerHTML=html;
}

function editFaculty(id){
  const f=faculty.find(x=>x.id===id);
  if(!f) return;
  editId=id;
  document.getElementById("name").value=f.name||"";
  document.getElementById("dept").value=f.dept||"";
  document.getElementById("empid").value=f.empid||"";
  document.getElementById("email").value=f.email||"";
  document.getElementById("mobile").value=f.mobile||"";
  document.getElementById("designation").value=f.designation||"";
  document.getElementById("scheduleContainer").innerHTML="";
  if(f.schedules){f.schedules.forEach(s=>addScheduleRow(s));}
  document.getElementById("facultyModal").style.display="flex";
}

function deleteFaculty(id){
  if(!confirm("Delete Faculty? This will remove all schedules.")) return;
  facultyRef.child(id).remove();
  showToast('Faculty deleted','success');
}

// SUBSTITUTION MODULE
function loadSubstitutionPage(){
  let html=`
    <div class="card">
      <h2><i class="fa-solid fa-people-arrows"></i> Faculty Substitution Manager</h2>
      <div class="row" style="margin-top:20px;">
        <select id="subFacultySelect">
          <option value="">Select Faculty on Leave</option>
          ${faculty.map(f=>`<option value="${f.id}">${f.name} - ${f.dept}</option>`).join("")}
        </select>
        <input type="date" id="subDate" value="${new Date().toISOString().split('T')[0]}" onchange="updateSubDayFromDate()">
        <select id="subDay">
          <option value="">Select Day</option>
          ${days.map(d=>`<option>${d}</option>`).join("")}
        </select>
        <select id="subPeriod">
          <option value="">Select Period</option>
          ${periods.map(p=>`<option>${p}</option>`).join("")}
        </select>
      </div>
      <button class="btn btn-primary" onclick="findSubstitutes()"><i class="fa-solid fa-search"></i> Find Available Faculty</button>
      <div id="subResult" style="margin-top:20px;"></div>
    </div>
  `;
  document.getElementById("substitutionPage").innerHTML=html;
}

function updateSubDayFromDate(){
  const dateVal=document.getElementById("subDate").value;
  if(dateVal){
    const dayName=new Date(dateVal).toLocaleDateString('en-US',{weekday:'long'});
    document.getElementById("subDay").value=dayName;
  }
}

function findSubstitutes(){
  const facultyId=document.getElementById("subFacultySelect").value;
  const day=document.getElementById("subDay").value;
  const period=document.getElementById("subPeriod").value;
  const date=document.getElementById("subDate").value;
  
  if(!facultyId||!day||!period||!date){
    alert("Please select all fields");
    return;
  }
  
  const leaveFaculty=faculty.find(f=>f.id===facultyId);
  const classToSub=leaveFaculty.schedules?.find(s=>s.day===day&&s.period===period);
  
  if(!classToSub){
    document.getElementById("subResult").innerHTML=`<div class="empty-state"><i class="fa-solid fa-circle-info"></i><p>${leaveFaculty.name} has no class at ${period} on ${day}</p></div>`;
    return;
  }
  
  const now=new Date();
  const busyFacultyIds=new Set();
  
  // 1. Faculty with regular class at this time
  faculty.forEach(f=>{
    if(f.schedules?.some(s=>s.day===day&&s.period===period)){
      busyFacultyIds.add(f.id);
    }
  });
  
  // 2. Faculty already substituting ANYONE at this exact date+period
 substitutions.forEach(s=>{
  if(
      s.date === date &&
      s.period === period &&
      s.status === 'active'
  ){
      busyFacultyIds.add(s.subFacultyId);
  }
});
  
  const freeFaculty=faculty.filter(f=>f.id!==facultyId&&!busyFacultyIds.has(f.id));
  
  let html=`<div class="card"><h3>Class Details</h3>
    <p><b>Subject:</b> ${classToSub.subject} | <b>Section:</b> ${classToSub.section} | <b>Room:</b> ${classToSub.room}</p>

  if(freeFaculty.length===0){
    html+=`<div class="empty-state"><i class="fa-solid fa-user-slash"></i><p>No faculty available</p><p style="font-size:12px;margin-top:8px;">All faculty are either teaching or already assigned as substitutes</p></div>`;
  }else{
    freeFaculty.forEach(f=>{
      html+=`<div class="sub-card">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">

            <span style="color:var(--muted);font-size:13px;">${f.dept} | ${f.designation||'Faculty'} | ${f.mobile||'N/A'}</span>
          </div>
          <button class="btn btn-success" onclick="assignSubstitute('${facultyId}','${f.id}','${day}','${period}','${date}','${classToSub.subject}','${classToSub.section}','${classToSub.room}')">
            <i class="fa-solid fa-user-check"></i> Assign
          </button>
        </div>
      </div>`;
    });
  }
  html+=`</div>`;
  document.getElementById("subResult").innerHTML=html;
}
function assignSubstitute(leaveFacultyId,subFacultyId,day,period,date,subject,section,room){
  const leaveFaculty=faculty.find(f=>f.id===leaveFacultyId);
  const subFaculty=faculty.find(f=>f.id===subFacultyId);
  
  // Check if this exact slot is already taken
// SAME CLASS ALREADY ASSIGNED ?
const classAlreadyAssigned = substitutions.find(s =>
    s.date === date &&
    s.period === period &&
    s.leaveFacultyId === leaveFacultyId &&
    s.subject === subject &&
    s.section === section &&
    s.status === 'active'
);

if(classAlreadyAssigned){
    alert(
      "This class is already assigned to " +
      classAlreadyAssigned.subFacultyName
    );
    return;
}

// SUBSTITUTE FACULTY ALREADY BUSY ?
const facultyBusy = substitutions.find(s =>
    s.date === date &&
    s.period === period &&
    s.subFacultyId === subFacultyId &&
    s.status === 'active'
);

if(facultyBusy){
    alert(
      subFaculty.name +
      " is already assigned at this time slot"
    );
    return;
}
  
  const subData={
    leaveFacultyId,
    leaveFacultyName:leaveFaculty.name,
    leaveFacultyDept:leaveFaculty.dept,
    leaveFacultyMobile:leaveFaculty.mobile||'',
    subFacultyId,
    subFacultyName:subFaculty.name,
    subFacultyMobile:subFaculty.mobile||'',
    day,period,date,subject,section,room,
    assignedAt:new Date().toISOString(),
    endDateTime:new Date(date+'T'+period.split('-')[1]+':00').toISOString(),
    status:'active'
  };
  
  substitutionRef.push(subData).then(()=>{
    showToast(`Assigned: ${subFaculty.name} will take ${subject}`,'success');
    loadSubstitutions();
    loadActiveSubstitutions();
    updateSubAlert();
    findSubstitutes(); // Refresh list to hide this faculty now
  });
}

function loadSubstitutions(){
  substitutionRef.on("value",snap=>{
    const data=snap.val();
    substitutions=data?Object.keys(data).map(id=>({id,...data[id]})):[];
    console.log(substitutions);// PRAKASH
    // AUTO-RELEASE: Mark past substitutions as completed
    const now=new Date();
    substitutions.forEach(s=>{
      if(s.status==='active' && new Date(s.endDateTime)<now){
        substitutionRef.child(s.id).update({status:'completed',completedAt:now.toISOString()});
      }
    });
    
    loadActiveSubstitutions();
    updateSubAlert();
  });
}

function loadActiveSubstitutions(){
  const now=new Date();
  let html=`<div class="card"><h2><i class="fa-solid fa-bell"></i> Active Substitutions</h2>`;
  let hasActive=false;
  
  substitutions.forEach(s=>{
    const endTime=new Date(s.endDateTime);
    if(endTime>now&&s.status==='active'){
      hasActive=true;
      const timeLeft=Math.ceil((endTime-now)/(1000*60*60));
      html+=`<div class="sub-card">
        <div style="display:flex;justify-content:space-between;align-items:start;gap:10px;flex-wrap:wrap;">
          <div>
            <span class="badge badge-warning">${s.period}</span>
            <b style="margin-left:8px;">${s.subject}</b>
            <span class="badge badge-success" style="margin-left:8px;">${timeLeft}h left</span><br>
            <span style="font-size:13px;color:var(--muted);">
              <i class="fa-solid fa-user-slash"></i> ${s.leaveFacultyName} → <i class="fa-solid fa-user-check"></i> ${s.subFacultyName}<br>
              ${s.day}, ${s.date} | Section: ${s.section} | Room: ${s.room}
            </span>
          </div>
          <button class="btn btn-danger btn-sm" onclick="cancelSubstitution('${s.id}')"><i class="fa-solid fa-xmark"></i> Cancel</button>
        </div>
      </div>`;
    }
  });
  
  if(!hasActive) html+=`<p style="color:var(--muted);">No active substitutions</p>`;
  html+="</div>";
  document.getElementById("activeSubs").innerHTML=html;
}

function cancelSubstitution(id){
  if(confirm("Cancel this substitution?")){
    substitutionRef.child(id).update({status:'cancelled',cancelledAt:new Date().toISOString()});
    loadSubstitutions();
    loadActiveSubstitutions();
    updateSubAlert();
    showToast('Substitution cancelled','warning');
  }
}

function updateSubAlert(){
  const alertBox=document.getElementById("subAlert");
  if(!alertBox) return;
  const now=new Date();
  let count=0;
  substitutions.forEach(sub=>{
    if(new Date(sub.endDateTime)>now&&sub.status==='active'){count++;}
  });
  alertBox.innerHTML=count>0?`🔔 ${count} Active Substitution(s)`:"";
}

function showToast(msg,type='success'){
  const toast=document.createElement('div');
  toast.style.cssText=`position:fixed;bottom:20px;right:20px;background:white;padding:12px 20px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:2000;border-left:4px solid ${type==='success'?'#16a34a':type==='warning'?'#d97706':'#dc2626'};`;
  toast.innerHTML=`<i class="fa-solid fa-${type==='success'?'check-circle':type==='warning'?'exclamation-triangle':'xmark-circle'}"></i> ${msg}`;
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),3000);
}

window.onclick=function(e){
  const modal=document.getElementById("facultyModal");
  if(e.target===modal){closeModal();}
};
